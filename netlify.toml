# Improves repeat visits and CDN efficiency. Prerender runs by default after `vite build`
# (Puppeteer + sitemap routes). Set DISABLE_PRERENDER=true to skip static HTML generation.
[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    NODE_VERSION = "20"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
